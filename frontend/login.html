<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — CampusConnect</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h2>CampusConnect</h2>
      <form id="loginForm">
        <input id="loginEmail" placeholder="Email" type="email" required />
        <input id="loginPass" placeholder="Password" type="password" required />
        <button type="submit">Login</button>
      </form>
      <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPass').value;
      try {
        const r = await app.apiPost('/auth/login', { email, password });
        if (r.token) {
          app.setToken(r.token);
          await app.init();
          location.href = 'index.html';
        } else alert(r.msg || 'Login failed');
      } catch (err) { alert('Login error'); }
    });
  </script>
</body>
</html>
