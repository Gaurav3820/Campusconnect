<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notices — CampusConnect</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><h1>CampusConnect</h1></div>
      <nav>
        <a href="index.html" class="nav-item">🏠 Dashboard</a>
        <a href="notices.html" class="nav-item active">📣 Notices</a>
        <a href="materials.html" class="nav-item">📚 Materials</a>
        
        <a href="forum.html" class="nav-item">💬 Forum</a>
        <a href="profile.html" class="nav-item">👤 Profile</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="search"><input placeholder="Search anything..." /></div>
        <div class="profile-area"><img class="avatar" src="https://i.pravatar.cc/40"></div>
      </header>

      <section class="content">
        <h2>Notices</h2>

        <div id="noticeList" class="card big-card"></div>

        <div id="postNoticeCard" class="card">
  <h3>Post a Notice</h3>
  <form id="noticeForm">
    <input id="noticeTitle" placeholder="Title" required />
    <textarea id="noticeDesc" placeholder="Description" rows="4" required></textarea>
    <button type="submit">Post Notice</button>
  </form>
</div>

      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
(async () => {
    await app.init();

    // 🔥 ADMIN CHECK — paste here EXACTLY
    const isAdmin = app.user && app.user.role === 'admin';
    const postFormCard = document.querySelector('#postNoticeCard');

    if (!isAdmin) {
        // hide the form if the user is not admin
        if (postFormCard) postFormCard.style.display = 'none';
    }

    const noticeList = document.getElementById('noticeList');

    async function loadNotices() {
        const notices = await app.apiGet('/notices/all').catch(() => []);
        if (!notices.length) {
            noticeList.innerHTML = '<p>No notices yet.</p>';
        } else {
            noticeList.innerHTML = notices
                .map(
                    (n) => `
                <div class="notice-item">
                    <h4>${n.title}</h4>
                    <p>${n.description}</p>
                    <small>${new Date(n.created_at).toLocaleString()}</small>
                </div>
            `
                )
                .join('');
        }
    }

    await loadNotices();

    // ONLY admin will see the form, so we still attach the handler
    if (isAdmin) {
        document
            .getElementById('noticeForm')
            .addEventListener('submit', async (e) => {
                e.preventDefault();

                const payload = {
                    title: document.getElementById('noticeTitle').value,
                    description: document.getElementById('noticeDesc').value,
                };

                const res = await app.apiPost('/notices/create', payload);
                alert(res.msg || 'Posted');
                document.getElementById('noticeForm').reset();
                await loadNotices();
            });
    }
})();
</script>

</body>
</html>
