<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profile — CampusConnect</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><h1>CampusConnect</h1></div>
      <nav>
        <a href="index.html" class="nav-item">🏠 Dashboard</a>
        <a href="notices.html" class="nav-item">📣 Notices</a>
        <a href="materials.html" class="nav-item">📚 Materials</a>
        
        <a href="forum.html" class="nav-item">💬 Forum</a>
        <a href="profile.html" class="nav-item active">👤 Profile</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar"><div class="search"><input placeholder="Search anything..." /></div></header>

      <section class="content">
        <h2>Your Profile</h2>
        <div class="card big-card" id="profileCard">
          <div class="profile-grid">
            <img id="profileImg" class="big-avatar" src="https://i.pravatar.cc/120" />
            <div>
              <h3 id="pfName">Student Name</h3>
              <p id="pfEmail">student@mail.com</p>
              <p id="pfDetails">Program: BCA • Session: 2023 — Current Semester: 4</p>
            </div>
          </div>
        </div>

        <div class="card">
          <h3>Edit Profile</h3>
          <form id="editProfile">
            <input id="nameInput" placeholder="Full name" />
            <input id="emailInput" placeholder="Email" />
            <button type="submit">Save</button>
          </form>
          <button id="logoutBtn" class="danger">Logout</button>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    (async ()=>{
      await app.init();
      const u = app.user || {};
      document.getElementById('pfName').innerText = u.name || 'Student';
      document.getElementById('pfEmail').innerText = u.email || '';
      document.getElementById('nameInput').value = u.name || '';
      document.getElementById('emailInput').value = u.email || '';

      document.getElementById('logoutBtn').addEventListener('click', ()=>{
        app.logout();
      });

      document.getElementById('editProfile').addEventListener('submit', async (e)=>{
        e.preventDefault();
        alert('Profile update endpoint not implemented on backend in this template. Implement PUT /api/auth/me to update.');
      });
    })();
  </script>
</body>
</html>
