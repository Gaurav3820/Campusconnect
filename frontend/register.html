<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register — CampusConnect</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Create account</h2>
      <form id="registerForm">
        <input id="regName" placeholder="Full name" required />
        <input id="regEmail" placeholder="Email" type="email" required />
        <input id="regPass" placeholder="Password" type="password" required />
        <button type="submit">Register</button>
      </form>
      <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPass').value;
      const r = await app.apiPost('/auth/register', { name, email, password });
      alert(r.msg || 'Registered');
      if (!r.error) location.href = 'login.html';
    });
  </script>
</body>
</html>
